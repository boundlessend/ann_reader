name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: run ANNKit tests
        run: swift test

  release:
    runs-on: macos-26
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # полная история: package.sh берёт версию из git describe
      - name: install create-dmg
        run: npm install -g create-dmg@8.1.0
      - name: build app bundle and dmg
        run: ./package.sh
      - name: publish release with dmg
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/*.dmg \
            --title "ANN Reader ${GITHUB_REF_NAME#v}" \
            --generate-notes
