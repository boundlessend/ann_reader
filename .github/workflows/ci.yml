name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: run ANNKit tests
        run: swift test

  # артефакт dmg собираем только на main и только после зелёных тестов;
  # на тег это делает release.yml
  package:
    runs-on: macos-26
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # полная история: package.sh берёт версию из git describe
      - name: install create-dmg
        run: npm install -g create-dmg@8.1.0
      - name: build app bundle and dmg
        run: ./package.sh
      - name: upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ANN-Reader-dmg
          path: dist/*.dmg
          if-no-files-found: error
